name: TurboLog CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Every Sunday 00:00 UTC — early detection of dependency breakage
    - cron: '0 0 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  MODEL_CACHE_KEY: onnx-minilm-v2-rev1

# ─────────────────────────── Jobs ───────────────────────────

jobs:

  # ① Lint & Format ─────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: sudo apt-get update -q && sudo apt-get install -y libopenblas-dev

      - name: Restore ONNX model cache
        uses: actions/cache@v4
        with:
          path: models/
          key: ${{ env.MODEL_CACHE_KEY }}

      - name: Download ONNX models (if not cached)
        run: bash scripts/download_model.sh

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy (all targets + all features)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check for TODO/FIXME in src
        run: |
          echo "::group::TODO/FIXME markers"
          grep -rn 'TODO\|FIXME\|HACK\|XXX' src/ || echo "✅ Clean — no TODO markers found"
          echo "::endgroup::"

  # ② Dependency Audit (cargo-deny) ─────────────────────────
  audit:
    name: Dependency Audit (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  # ③ Unit & Integration Tests (cross-platform, cargo-nextest) ──
  test:
    name: Test (${{ matrix.os }}, rust-${{ matrix.rust }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        rust: [ stable, beta ]
        exclude:
          - os: macos-latest
            rust: beta
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (${{ matrix.rust }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.rust }}

      - name: Restore ONNX model cache
        uses: actions/cache@v4
        with:
          path: models/
          key: ${{ env.MODEL_CACHE_KEY }}

      - name: Install system deps (Ubuntu only)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y libopenblas-dev

      - name: Download ONNX models (if not cached)
        run: bash scripts/download_model.sh

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Build (all features)
        run: cargo build --all-features

      - name: Run unit tests (nextest)
        run: cargo nextest run --lib --all-features --profile ci

      - name: Run integration tests (nextest)
        run: cargo nextest run --tests --all-features --profile ci
        env:
          RUST_LOG: turbolog=debug

      - name: Run doc tests
        run: cargo test --doc

  # ④ Code Coverage ────────────────────────────────────────
  coverage:
    name: Code Coverage
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: coverage

      - name: Install system deps
        run: sudo apt-get update -q && sudo apt-get install -y libopenblas-dev

      - name: Restore ONNX model cache
        uses: actions/cache@v4
        with:
          path: models/
          key: ${{ env.MODEL_CACHE_KEY }}

      - name: Download ONNX models (if not cached)
        run: bash scripts/download_model.sh

      - name: Generate coverage (LCOV)
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

      - name: Coverage summary (inline)
        run: cargo llvm-cov --all-features --workspace --text | head -60

  # ⑥ Miri (UB detection on pure-Rust code) ─────────────────
  miri:
    name: Miri (UB detection)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly + Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: miri

      # Miri cannot run FFI (ort, turbovec C bindings),
      # so we run only pure-Rust unit tests.
      - name: Run Miri on pure-Rust unit tests
        run: |
          cargo miri test --lib -- \
            fnv1a64_deterministic \
            different_pattern_different_template_id \
            same_pattern_same_template_id \
            fit_two_clusters_and_min_distance \
            append_replay_rotate \
            truncated_tail_ignored \
            segment_layout_and_sweep
        env:
          MIRIFLAGS: -Zmiri-disable-isolation

  # ⑦ Release Build (base + embedded + tui) ─────────────────
  release-build:
    name: Release Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release

      - name: Install system deps
        run: sudo apt-get update -q && sudo apt-get install -y libopenblas-dev

      - name: Restore ONNX model cache
        uses: actions/cache@v4
        with:
          path: models/
          key: ${{ env.MODEL_CACHE_KEY }}

      - name: Download ONNX models (if not cached)
        run: bash scripts/download_model.sh

      - name: Build release binary (base)
        run: cargo build --release

      - name: Build release binary (all features)
        run: cargo build --release --all-features

      - name: Build release binary (embedded model + tui)
        run: cargo build --release --features embedded-model,tui

      - name: Verify binary runs (--help smoke test)
        run: |
          file target/release/turbolog
          ls -lh target/release/turbolog
          target/release/turbolog --help

      - name: Upload release binary (all-features)
        uses: actions/upload-artifact@v4
        with:
          name: turbolog-linux-amd64
          path: target/release/turbolog
          retention-days: 7
