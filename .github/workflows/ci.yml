name: TurboLog CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Every Sunday 00:00 UTC — early detection of dependency breakage
    - cron: '0 0 * * 0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true # Cancel previous runs on the same branch to save resources

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # ONNX model cache key (update when the model URL changes)
  MODEL_CACHE_KEY: onnx-minilm-v2-rev1

# ─────────────────────────── Jobs ───────────────────────────

jobs:

  # ① Lint & Format ─────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install system deps
        run: sudo apt-get update -q && sudo apt-get install -y libopenblas-dev

      - name: Restore ONNX model cache
        uses: actions/cache@v4
        with:
          path: models/
          key: ${{ env.MODEL_CACHE_KEY }}

      - name: Download ONNX models (if not cached)
        run: bash scripts/download_model.sh

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy (all targets)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check for TODO/FIXME in src
        run: |
          echo "::group::TODO/FIXME markers"
          grep -rn 'TODO\|FIXME\|HACK\|XXX' src/ || echo "✅ Clean — no TODO markers found"
          echo "::endgroup::"

  # ② Unit Tests (cross-platform) ─────────────────────────────
  test:
    name: Test (${{ matrix.os }}, rust-${{ matrix.rust }})
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        rust: [ stable, beta ]
        exclude:
          # Validate beta only on Ubuntu — macOS beta runs are not cost-effective
          - os: macos-latest
            rust: beta
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (${{ matrix.rust }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.rust }}

      - name: Restore ONNX model cache
        uses: actions/cache@v4
        with:
          path: models/
          key: ${{ env.MODEL_CACHE_KEY }}

      - name: Install system deps (Ubuntu only)
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y libopenblas-dev

      - name: Download ONNX models (if not cached)
        run: bash scripts/download_model.sh

      - name: Build (check compilation)
        run: cargo build --all-features

      - name: Run unit tests
        run: cargo test --lib --all-features

      - name: Run integration tests
        run: cargo test --tests --all-features
        env:
          RUST_LOG: turbolog=debug

      - name: Run doc tests
        run: cargo test --doc

  # ③ MSRV — minimum supported Rust version verification ───────────────────────
  msrv:
    name: MSRV (edition 2021)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85.0 (MSRV — zeroize/ring transitive deps require edition 2024)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: Install system deps
        run: sudo apt-get update -q && sudo apt-get install -y libopenblas-dev

      - name: Check compilation
        run: cargo check --all-features

  # ④ Security Audit ────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit dependencies
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ⑤ Code Coverage ────────────────────────────────────────
  coverage:
    name: Code Coverage
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: coverage

      - name: Install system deps
        run: sudo apt-get update -q && sudo apt-get install -y libopenblas-dev

      - name: Restore ONNX model cache
        uses: actions/cache@v4
        with:
          path: models/
          key: ${{ env.MODEL_CACHE_KEY }}

      - name: Download ONNX models (if not cached)
        run: bash scripts/download_model.sh

      - name: Generate coverage (LCOV)
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

      - name: Coverage summary (inline)
        run: cargo llvm-cov --all-features --workspace --text | head -60

  # ⑥ Leak / UB Sanitizer (Miri) ───────────────────────────
  miri:
    name: Miri (UB detection)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly + Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: miri

      # Miri cannot run FFI (ort, turbovec C bindings),
      # so we run only pure-Rust unit tests.
      - name: Run Miri on pure-Rust unit tests
        run: |
          cargo miri test --lib -- \
            fnv1a64_deterministic \
            different_pattern_different_template_id \
            same_pattern_same_template_id \
            fit_two_clusters_and_min_distance \
            append_replay_rotate \
            truncated_tail_ignored \
            segment_layout_and_sweep
        env:
          MIRIFLAGS: -Zmiri-disable-isolation

  # ⑦ Binary build check (release profile) ──────────────────
  release-build:
    name: Release Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release

      - name: Install system deps
        run: sudo apt-get update -q && sudo apt-get install -y libopenblas-dev

      - name: Restore ONNX model cache
        uses: actions/cache@v4
        with:
          path: models/
          key: ${{ env.MODEL_CACHE_KEY }}

      - name: Download ONNX models (if not cached)
        run: bash scripts/download_model.sh

      - name: Build release binary
        run: cargo build --release --all-features

      - name: Verify binary runs (--help or quick smoke)
        run: |
          # Verify the binary is compiled and linked properly
          file target/release/turbolog
          ls -lh target/release/turbolog

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: turbolog-linux-amd64
          path: target/release/turbolog
          retention-days: 7
