name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  MODEL_CACHE_KEY: onnx-minilm-v2-rev1

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: turbolog
            archive: turbolog-x86_64-linux.tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            binary: turbolog
            archive: turbolog-aarch64-linux.tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            binary: turbolog
            archive: turbolog-aarch64-macos.tar.gz

          - target: x86_64-apple-darwin
            os: macos-13
            binary: turbolog
            archive: turbolog-x86_64-macos.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Restore ONNX model cache
        uses: actions/cache@v4
        with:
          path: models/
          key: ${{ env.MODEL_CACHE_KEY }}

      - name: Download ONNX models
        run: bash scripts/download_model.sh

      - name: Build release binary
        run: cargo build --release --features embedded-model,tui --target ${{ matrix.target }}
        env:
          ORT_STRATEGY: download
          CARGO_TARGET_DIR: target

      - name: Strip binary (Linux/macOS)
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }} || true

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ./${{ matrix.binary }}
          tar czf ${{ matrix.archive }} ${{ matrix.binary }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Publish checksums for all binaries after all builds complete.
  checksums:
    name: Generate Checksums
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lh *.tar.gz 2>/dev/null || echo "no local artifacts (downloaded via release)"

      - name: Done
        run: echo "Release ${{ github.ref_name }} published successfully"
