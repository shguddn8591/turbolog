[licenses]
# In v2, anything not in 'allow' is implicitly denied.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "OpenSSL",
    "Zlib",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[advisories]
# Ignore advisories in transitive deps we cannot directly fix.
ignore = [
    # RUSTSEC-2026-0002: IterMut unsound (transitive dep, not directly fixable)
    "RUSTSEC-2026-0002",
    # RUSTSEC-2024-0436: paste unmaintained (pulled in by tokenizers/ort)
    "RUSTSEC-2024-0436",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
