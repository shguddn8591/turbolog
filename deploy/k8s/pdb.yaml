---
# TurboLog PodDisruptionBudget
#
# Ensures that at least 4 replicas are always available during
# rolling updates, node drains, or cluster upgrades.
#
# Based on a minimum of 6 replicas:
#   minAvailable: 4 -> Allows up to 2 concurrent disruptions.
#   Matches Deployment rollingUpdate.maxUnavailable: 2.
#
# When operating in 3 AZs: 4 available = at least 1 per AZ + 1 spare.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: turbolog
  namespace: turbolog
  labels:
    app.kubernetes.io/name: turbolog
    app.kubernetes.io/component: pdb
spec:
  minAvailable: 4
  selector:
    matchLabels:
      app.kubernetes.io/name: turbolog
