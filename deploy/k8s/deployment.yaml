---
# TurboLog Deployment
#
# Design decisions:
#   - TurboLog is a stateful-lite service with an in-memory index (arc-swap based).
#     Each replica is responsible for an independent index shard, and clients are routed
#     to the same replica using a consistent hash LB (e.g., Nginx/Envoy's hash_policy).
#   - The WAL (.wal) and index snapshots (.tvim) are written to the /data volume.
#     For short-term operations, emptyDir (node local) is sufficient, but replace with PVC if persistence is needed.
#   - Model files (model.onnx, tokenizer.json) are downloaded by an initContainer into a /models emptyDir.
#     This keeps the image lightweight compared to baking them in.
#   - resources.limits.memory calculation basis:
#       2 embedders * ~90 MB = ~180 MB
#       Index + WAL buffer + Heap ≈ 300 MB
#       Total ≈ 512 MB (768 Mi recommended including margin)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: turbolog
  namespace: turbolog
  labels:
    app.kubernetes.io/name: turbolog
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/component: engine
  annotations:
    # Prometheus scrape settings — Works with this annotation when ServiceMonitor is not used
    prometheus.io/scrape: "true"
    prometheus.io/port: "8087"
    prometheus.io/path: "/metrics"
spec:
  replicas: 6
  selector:
    matchLabels:
      app.kubernetes.io/name: turbolog
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Matches PDB (minAvailable: 4) to replace up to 2 concurrently
      maxUnavailable: 2
      maxSurge: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: turbolog
        app.kubernetes.io/version: "0.1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8087"
        prometheus.io/path: "/metrics"
    spec:
      # ────────────────────────────────────────────
      # initContainer: Download model files
      # ────────────────────────────────────────────
      # In production, replace the URL below with internal artifact storage (S3, GCS, Harbor).
      # Alternatively, a dedicated init image with pre-packaged models can be used:
      #   image: registry.example.com/turbolog-models:0.1.0
      #   command: ["cp", "-r", "/bundled-models/.", "/models/"]
      initContainers:
        - name: model-init
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              set -e
              echo "[model-init] Downloading model files..."
              # TODO: Replace with actual model storage URL
              # curl -fL "$MODEL_BASE_URL/model.onnx" -o /models/model.onnx
              # curl -fL "$MODEL_BASE_URL/tokenizer.json" -o /models/tokenizer.json
              echo "[model-init] Placeholder: models already present or mounted via PVC"
              ls /models/
          env:
            - name: MODEL_BASE_URL
              value: "https://artifacts.example.com/turbolog-models/v0.1.0"
          volumeMounts:
            - name: model-volume
              mountPath: /models
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

      # ────────────────────────────────────────────
      # Main container
      # ────────────────────────────────────────────
      containers:
        - name: turbolog
          # TODO: Replace with actual image registry path
          image: registry.example.com/turbolog:0.1.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8087
              protocol: TCP

          # Environment variables: Inject non-secret settings from ConfigMap
          envFrom:
            - configMapRef:
                name: turbolog-config
          env:
            # Authentication token is injected from Secret (if absent, operates in no-auth mode)
            - name: TURBOLOG_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: turbolog-secret
                  key: auth-token
                  optional: true  # Operates in no-auth mode if token is absent

          # ─ Resources ──────────────────────────────
          # Based on 2 embedders * ~90 MB ONNX session + Index/WAL/Heap = ~512 MB.
          # If TURBOLOG_EMBEDDERS is increased, scale limits.memory proportionally.
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "768Mi"

          # ─ Probes ────────────────────────────────
          # startupProbe: Waits up to 60 seconds (6x10s) after container startup.
          #   Set sufficiently since model loading time can be long.
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 6
            periodSeconds: 10
            timeoutSeconds: 5

          # livenessProbe: Restarts if no response.
          #   /health -> Checks if the app is alive (detects deadlocks, panics)
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          # readinessProbe: Availability to receive traffic.
          #   /ready -> Returns 200 when index warm-up and model load are complete.
          #   If not ready, returns 503 -> Excluded from Service endpoints.
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # ─ Volume Mounts ─────────────────────────
          volumeMounts:
            - name: data-volume
              mountPath: /data
            - name: model-volume
              mountPath: /models
              readOnly: true
            # Temporary write area (to bypass readOnlyRootFilesystem=true)
            - name: tmp
              mountPath: /tmp

          # ─ Security Context ─────────────────────
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

          # ─ Graceful Shutdown ────────────────────
          # On SIGTERM -> App exits after completing the last swap_tick.
          # Guarantees processing completion within terminationGracePeriodSeconds.
          lifecycle:
            preStop:
              exec:
                # Suspends accepting new connections and waits for ongoing requests to complete
                command: ["/bin/sh", "-c", "sleep 5"]

      terminationGracePeriodSeconds: 30

      # ────────────────────────────────────────────
      # Volumes
      # ────────────────────────────────────────────
      volumes:
        # WAL + Index snapshot.
        # emptyDir: Node local, initialized upon pod restart.
        # If persistence is needed, replace the emptyDir block below with a PersistentVolumeClaim:
        #   persistentVolumeClaim:
        #     claimName: turbolog-data-<pod-name>  # Automatically created when using StatefulSet
        - name: data-volume
          emptyDir:
            medium: ""
            # sizeLimit: 20Gi  # Limit as needed
        # Model files (populated by initContainer)
        - name: model-volume
          emptyDir:
            medium: ""
            sizeLimit: 2Gi
        # Temporary write space (/tmp)
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi

      # ────────────────────────────────────────────
      # Pod spread: Prevents multiple replicas from crowding on the same node
      # ────────────────────────────────────────────
      affinity:
        podAntiAffinity:
          # preferred: Prefer different nodes, allow same node if impossible
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: turbolog
                topologyKey: kubernetes.io/hostname
          # required: Availability Zone (AZ) spread — If less than 2 AZs, change required -> preferred
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: turbolog
              topologyKey: topology.kubernetes.io/zone

      # Service account (Least privilege)
      serviceAccountName: turbolog
      automountServiceAccountToken: false
