---
# TurboLog Service — ClusterIP
# 클러스터 내부에서만 접근 가능. 외부 노출은 Ingress/LoadBalancer를 별도로 구성한다.
# TLS 종단은 Ingress 또는 외부 LB에서 처리하며 앱은 평문 HTTP로 통신한다.
apiVersion: v1
kind: Service
metadata:
  name: turbolog
  namespace: turbolog
  labels:
    app.kubernetes.io/name: turbolog
    app.kubernetes.io/component: engine
  annotations:
    # Prometheus ServiceMonitor 없이 어노테이션 기반 스크레이프를 사용하는 경우
    prometheus.io/scrape: "true"
    prometheus.io/port: "8087"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: turbolog
  ports:
    - name: http
      port: 8087
      targetPort: http
      protocol: TCP
