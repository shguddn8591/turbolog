---
# TurboLog Service — ClusterIP
# Accessible only within the cluster. External exposure is configured separately via Ingress/LoadBalancer.
# TLS termination is handled by Ingress or external LB, and the app communicates via plain HTTP.
apiVersion: v1
kind: Service
metadata:
  name: turbolog
  namespace: turbolog
  labels:
    app.kubernetes.io/name: turbolog
    app.kubernetes.io/component: engine
  annotations:
    # When using annotation-based scraping without Prometheus ServiceMonitor
    prometheus.io/scrape: "true"
    prometheus.io/port: "8087"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: turbolog
  ports:
    - name: http
      port: 8087
      targetPort: http
      protocol: TCP
