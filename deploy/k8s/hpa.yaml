---
# TurboLog HorizontalPodAutoscaler
#
# Target: CPU utilization 70%
#   CPU is dominated by embedding computations (ONNX inference) and serves as an intuitive scale signal.
#
# Custom metric extensibility (comment):
#   If turbolog_inflight_requests (currently processing requests) is exposed to the HPA custom metrics API
#   via Prometheus Adapter, it can be added instead of or alongside CPU as follows:
#
#   metrics:
#     - type: Pods
#       pods:
#         metric:
#           name: turbolog_inflight_requests
#         target:
#           type: AverageValue
#           averageValue: "800"   # Average in-flight threshold per replica
#
#   This approach is advantageous for proactive scale-out when there are many pending requests even if CPU is low.
#
# min 6 / max 50:
#   min=6 : Ensures at least 2 per AZ based on 3 AZs + satisfies PDB minAvailable=4
#   max=50: Assumes ~20k req/s throughput per replica based on 1M req/s target
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: turbolog
  namespace: turbolog
  labels:
    app.kubernetes.io/name: turbolog
    app.kubernetes.io/component: hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: turbolog
  minReplicas: 6
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
    scaleDown:
      # Scale down slowly to prevent service impact from rapid scaling
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 120
