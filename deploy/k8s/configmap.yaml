---
# TurboLog ConfigMap — Non-secret runtime configuration
# Sensitive values (TURBOLOG_AUTH_TOKEN) are managed in a separate Secret.
apiVersion: v1
kind: ConfigMap
metadata:
  name: turbolog-config
  namespace: turbolog
  labels:
    app.kubernetes.io/name: turbolog
    app.kubernetes.io/component: config
data:
  # HTTP listen port
  TURBOLOG_PORT: "8087"

  # Number of ONNX embedding workers.
  # Each embedder occupies ~90 MB of onnxruntime session memory.
  # 2 embedders → ~180 MB session memory + index/WAL overhead.
  TURBOLOG_EMBEDDERS: "2"

  # WAL and .tvim index file storage path (PVC or emptyDir mount)
  TURBOLOG_DATA_DIR: "/data"

  # model.onnx / tokenizer.json path (emptyDir populated by initContainer)
  TURBOLOG_MODEL_DIR: "/models"

  # Maximum concurrent in-flight requests (backpressure threshold).
  # Returns 503 when exceeded. 0 or unset means unlimited.
  TURBOLOG_MAX_INFLIGHT: "1000"
